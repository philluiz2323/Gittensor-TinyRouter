name: Issue bot

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure governance labels
        working-directory: scripts/repo_governance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ensure_labels.py

      - name: Triage issue
        working-directory: scripts/repo_governance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python run_issue_bot.py \
            --repo "${{ github.repository }}" \
            --issue-number "${{ github.event.issue.number }}"
