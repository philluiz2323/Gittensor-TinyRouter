name: Manual evaluation

on:
  workflow_dispatch:
    inputs:
      command:
        description: Offline eval command to validate
        required: true
        default: python scripts/audit_eval.py --help
        type: string

permissions:
  contents: read

jobs:
  manual-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run manual offline command
        run: ${{ inputs.command }}

      - name: Reminder
        run: |
          echo "This workflow is intentionally manual and offline."
          echo "Do not add OpenRouter, GPU, or hidden-benchmark secrets to the default CI lane."
