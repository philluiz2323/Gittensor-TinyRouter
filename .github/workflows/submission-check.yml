name: Submission pre-eval gates

on:
  pull_request:
    paths:
      - "submissions/**"

permissions:
  pull-requests: write
  contents: read

jobs:
  pre-eval:
    name: Pre-eval gate check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install numpy pyyaml

      - name: Detect submission directory
        id: detect
        run: |
          # Find the submission path from the PR diff (submissions/<miner>/<gen>/)
          SUB_PATH=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD \
            | grep '^submissions/[^/]*/[0-9]*/' \
            | head -1 \
            | sed 's|^submissions/||' \
            | sed 's|/$||')
          if [ -z "$SUB_PATH" ]; then
            echo "No submission directory found in PR."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "submission=$SUB_PATH" >> $GITHUB_OUTPUT
          echo "Detected submission: $SUB_PATH"

      - name: Run pre-eval gates
        if: steps.detect.outputs.skip != 'true'
        id: gates
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: |
          python scripts/preflight_submission.py \
            --submission "${{ steps.detect.outputs.submission }}" \
            --benchmark composite \
            --repo-root . 2>&1 | tee preflight_output.txt
          echo "result=pass" >> $GITHUB_OUTPUT
        working-directory: ${{ github.workspace }}

      - name: Set fail result
        if: steps.gates.outcome == 'failure'
        run: echo "result=fail" >> $GITHUB_OUTPUT

      - name: Post gate results comment
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUB="${{ steps.detect.outputs.submission }}"
          RESULT="${{ steps.gates.outputs.result }}"
          PR="${{ github.event.pull_request.number }}"

          if [ "$RESULT" = "pass" ]; then
            BODY="## ✅ Pre-eval gates passed

          Submission: \`submissions/$SUB\`

          All offline gates passed. The maintainer will run the full evaluation (\`pr_eval.py\`) on a GPU box within 48 hours.

          | Gate | Status |
          |---|---|
          | 1. Rate limit (1/day) | ✅ |
          | 2. Weight sanity | ✅ |
          | 3. Duplicate detection | ✅ |
          | 4. Receipt exists | ✅ |

          _(Gate 5: overfit check runs during full eval)_"
          else
            OUTPUT=$(cat preflight_output.txt 2>/dev/null | tail -20)
            BODY="## ❌ Pre-eval gates failed

          Submission: \`submissions/$SUB\`

          \`\`\`
          $OUTPUT
          \`\`\`

          Please fix the issue above and push again. See [\`COMPETITION_RULES.md\`](docs/COMPETITION_RULES.md) for the rules."
          fi

          gh pr comment $PR --body "$BODY"

      - name: Close PR on gate failure
        if: steps.gates.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          gh pr close $PR --comment "Closed automatically — pre-eval gates failed. Fix the issue and open a new PR."
