# The coordinated LLM pool (served through OpenRouter's OpenAI-compatible API).
# Roles are assigned dynamically by the coordinator at runtime; this file only
# declares which models exist and their per-call defaults.
#
# ===== Adding a new model =====
# 1. Add a new entry under `pool:` with a short `name` and the full OpenRouter model slug.
# 2. Add pricing to the PRICES dict in scripts/cost_report.py.
# 3. Run the selftest: python -m trinity.llm.openrouter_client --selftest
# 4. Update the model pool table in README.md.
# 5. The coordinator head dimension (n_a = L + 3) will auto-adjust from pool size.
#
# Example:
#   - name: claude-opus-4-8
#     id: "anthropic/claude-opus-4.1"

openrouter:
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"   # value read from env; NEVER hardcode here
  timeout_s: 180                      # long-context / reasoning models can be slow
  max_retries: 10                     # ride through transient provider and gateway hiccups
  max_concurrency: 8
  http_referer: ""
  app_title: "Gittensor TinyRouter"
  provider: {}

pool:
  - name: qwen3.5
    id: "qwen/qwen3.5-35b-a3b"
  - name: gemini-flash-lite
    id: "google/gemini-3.1-flash-lite"
  - name: deepseek-v4-flash
    id: "deepseek/deepseek-v4-flash"

# Per-role decoding defaults. Confirm/override against docs/SPEC.md once the
# paper's exact decoding settings are extracted. [provisional]
decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
